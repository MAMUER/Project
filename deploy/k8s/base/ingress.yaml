apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: healthfit-ingress
  namespace: healthfit
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.healthfit.ru
    - app.healthfit.ru
    secretName: healthfit-tls
  rules:
  - host: api.healthfit.ru
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway-service
            port:
              number: 8080
  - host: app.healthfit.ru
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 3000