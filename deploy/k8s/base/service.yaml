apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: healthfit
spec:
  selector:
    app: healthfit-auth
  ports:
  - port: 50051
    targetPort: 50051
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: biometric-ingest-service
  namespace: healthfit
spec:
  selector:
    app: healthfit-biometric-ingest
  ports:
  - port: 8082
    targetPort: 8082
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: ml-classification-service
  namespace: healthfit
spec:
  selector:
    app: healthfit-ml-classification
  ports:
  - port: 8001
    targetPort: 8001
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: ml-generation-service
  namespace: healthfit
spec:
  selector:
    app: healthfit-ml-generation
  ports:
  - port: 8002
    targetPort: 8002
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: healthfit
spec:
  selector:
    app: healthfit-api-gateway
  ports:
  - port: 8080
    targetPort: 8080
  type: LoadBalancer