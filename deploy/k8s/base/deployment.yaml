apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthfit-auth
  namespace: healthfit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: healthfit-auth
  template:
    metadata:
      labels:
        app: healthfit-auth
    spec:
      containers:
      - name: auth
        image: ghcr.io/mamuer/healthfit/auth:latest
        ports:
        - containerPort: 50051
        env:
        - name: SERVICE_PORT
          value: "50051"
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: healthfit-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: healthfit-config
              key: DB_PORT
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: healthfit-secrets
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: healthfit-secrets
              key: DB_PASSWORD
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: healthfit-config
              key: DB_NAME
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: healthfit-secrets
              key: JWT_SECRET
        livenessProbe:
          exec:
            command: ["grpc_health_probe", "-addr=:50051"]
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["grpc_health_probe", "-addr=:50051"]
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthfit-biometric-ingest
  namespace: healthfit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: healthfit-biometric-ingest
  template:
    metadata:
      labels:
        app: healthfit-biometric-ingest
    spec:
      containers:
      - name: ingest
        image: ghcr.io/mamuer/healthfit/biometric-ingest:latest
        ports:
        - containerPort: 8082
        env:
        - name: SERVICE_PORT
          value: "8082"
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: healthfit-config
              key: DB_HOST
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: healthfit-secrets
              key: RABBITMQ_URL
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthfit-ml-classification
  namespace: healthfit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healthfit-ml-classification
  template:
    metadata:
      labels:
        app: healthfit-ml-classification
    spec:
      containers:
      - name: ml-classification
        image: ghcr.io/mamuer/healthfit/ml-classification:latest
        ports:
        - containerPort: 8001
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 5