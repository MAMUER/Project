events {
    worker_connections 1024;
}

http {
    server_tokens off;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream tasks_service {
        server tasks:8082;
    }

    upstream auth_service {
        server auth:8081;
    }

    server {
        listen 8443 ssl;
        server_name localhost;

        ssl_certificate /opt/techip/certs/cert.pem;
        ssl_certificate_key /opt/techip/certs/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # Общая страница для ошибок 5xx
        error_page 403 404 500 502 503 504 /errors/error.html;

        location /errors/ {
            root /usr/share/nginx/html;
            internal;
        }

        location /v1/tasks/ {
            proxy_pass http://tasks_service;
            proxy_set_header Authorization $http_authorization;
        }
        location /v1/auth/ {
            proxy_pass http://auth_service;
        }
        location / {
            return 200 "HTTPS Gateway";
        }
    }
}