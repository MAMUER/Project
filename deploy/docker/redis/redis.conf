# Redis configuration file

# Network
port 6379
bind 0.0.0.0

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence
appendonly yes
appendfsync everysec

# Save snapshots
save 900 1
save 300 10
save 60 10000

# Security
requirepass ""

# Performance
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Limits
maxclients 10000

# Logging
loglevel notice
logfile ""

# Databases
databases 16