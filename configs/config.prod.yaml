database:
  host: postgres-service
  port: 5432
  user: postgres
  password: ${DB_PASSWORD}
  dbname: fitness
  sslmode: disable

redis:
  addr: redis-service:6379
  password: ""
  db: 0

rabbitmq:
  url: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq-service:5672/

services:
  user:
    port: 50051
  biometric:
    port: 50052
  training:
    port: 50053
  gateway:
    port: 8080

ml:
  classifier_url: http://ml-classifier:8001
  generator_url: http://ml-generator:8002

jwt:
  secret: ${JWT_SECRET}
  expiration_hours: 24

log_level: info