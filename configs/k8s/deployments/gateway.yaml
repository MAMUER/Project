apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: fitness-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: ghcr.io/mamuer/technology_2_sem/gateway:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: GATEWAY_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: GATEWAY_PORT
        - name: USER_SERVICE_ADDR
          value: "user-service:50051"
        - name: BIOMETRIC_SERVICE_ADDR
          value: "biometric-service:50052"
        - name: TRAINING_SERVICE_ADDR
          value: "training-service:50053"
        - name: ML_CLASSIFIER_URL
          value: "http://ml-classifier:8001"
        - name: ML_GENERATOR_URL
          value: "http://ml-generator:8002"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: JWT_SECRET
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"