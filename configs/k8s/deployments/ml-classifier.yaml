apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-classifier
  namespace: fitness-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-classifier
  template:
    metadata:
      labels:
        app: ml-classifier
    spec:
      containers:
      - name: ml-classifier
        image: ghcr.io/mamuer/technology_2_sem/ml-classifier:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8001
          name: http
        env:
        - name: ML_CLASSIFIER_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: ML_CLASSIFIER_PORT
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"