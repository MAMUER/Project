apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-connector
  namespace: fitness-platform
  labels:
    app: device-connector
    tier: backend
    component: device-connector
spec:
  replicas: 2
  selector:
    matchLabels:
      app: device-connector
  template:
    metadata:
      labels:
        app: device-connector
        tier: backend
        component: device-connector
    spec:
      serviceAccountName: app-service-account
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - device-connector
              topologyKey: kubernetes.io/hostname
      containers:
      - name: device-connector
        image: ghcr.io/mamuer/technology_2_sem/device-connector:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8082
          name: http
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: POSTGRES_PASSWORD
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_NAME
        - name: BIOMETRIC_SERVICE_ADDR
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: BIOMETRIC_SERVICE_PORT
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_PORT
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
