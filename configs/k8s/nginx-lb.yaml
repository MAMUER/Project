apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-lb
  namespace: fitness-platform
  labels:
    app: nginx-lb
    tier: frontend
    component: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-lb
  template:
    metadata:
      labels:
        app: nginx-lb
        tier: frontend
        component: nginx
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
      serviceAccountName: app-service-account
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - nginx-lb
              topologyKey: kubernetes.io/hostname
      containers:
      - name: nginx-lb
        image: nginx:alpine
        imagePullPolicy: Always
        ports:
        - containerPort: 8443
          name: https
        securityContext:
          runAsNonRoot: true
          runAsUser: 101
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        livenessProbe:
          tcpSocket:
            port: 8443
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8443
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: tls-cert
          mountPath: /etc/nginx/certs
          readOnly: true
        - name: error-pages
          mountPath: /usr/share/nginx/html/errors
          readOnly: true
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
      - name: tls-cert
        secret:
          secretName: tls-cert
      - name: error-pages
        configMap:
          name: error-pages
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-lb-service
  namespace: fitness-platform
  labels:
    app: nginx-lb
    tier: frontend
    component: nginx
spec:
  type: ClusterIP
  selector:
    app: nginx-lb
  ports:
  - port: 8443
    targetPort: 8443
    name: https
