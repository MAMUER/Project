apiVersion: v1
kind: ConfigMap
metadata:
  name: init-sql
  namespace: fitness-platform
data:
  init.sql: |
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    
    CREATE TABLE IF NOT EXISTS users (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        email VARCHAR(255) UNIQUE NOT NULL,
        password_hash VARCHAR(255) NOT NULL,
        full_name VARCHAR(255),
        role VARCHAR(50) NOT NULL DEFAULT 'client',
        created_at TIMESTAMPTZ DEFAULT NOW(),
        updated_at TIMESTAMPTZ DEFAULT NOW()
    );
    
    CREATE TABLE IF NOT EXISTS user_profiles (
        user_id UUID PRIMARY KEY REFERENCES users(id) ON DELETE CASCADE,
        age INT,
        gender VARCHAR(10),
        height_cm INT,
        weight_kg DECIMAL(5,2),
        fitness_level VARCHAR(50),
        goals TEXT[],
        contraindications TEXT[],
        created_at TIMESTAMPTZ DEFAULT NOW(),
        updated_at TIMESTAMPTZ DEFAULT NOW()
    );
    
    CREATE TABLE IF NOT EXISTS biometric_data (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        metric_type VARCHAR(50) NOT NULL,
        value DOUBLE PRECISION NOT NULL,
        timestamp TIMESTAMPTZ NOT NULL,
        device_type VARCHAR(50),
        created_at TIMESTAMPTZ DEFAULT NOW()
    );
    
    CREATE INDEX IF NOT EXISTS idx_biometric_user_metric_time ON biometric_data(user_id, metric_type, timestamp);
    
    CREATE TABLE IF NOT EXISTS training_plans (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        plan_data JSONB NOT NULL,
        generated_at TIMESTAMPTZ DEFAULT NOW(),
        start_date DATE,
        end_date DATE,
        status VARCHAR(50) DEFAULT 'active'
    );
    
    CREATE TABLE IF NOT EXISTS workout_completions (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        training_plan_id UUID REFERENCES training_plans(id) ON DELETE CASCADE,
        workout_id VARCHAR(100) NOT NULL,
        scheduled_date DATE DEFAULT CURRENT_DATE,
        completed BOOLEAN DEFAULT FALSE,
        completed_at TIMESTAMPTZ,
        feedback TEXT,
        created_at TIMESTAMPTZ DEFAULT NOW()
    );
    
    CREATE TABLE IF NOT EXISTS achievements (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        name VARCHAR(255) NOT NULL,
        description TEXT,
        criteria JSONB,
        icon_url VARCHAR(255),
        created_at TIMESTAMPTZ DEFAULT NOW()
    );
    
    CREATE TABLE IF NOT EXISTS user_achievements (
        user_id UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        achievement_id UUID NOT NULL REFERENCES achievements(id) ON DELETE CASCADE,
        earned_at TIMESTAMPTZ DEFAULT NOW(),
        PRIMARY KEY (user_id, achievement_id)
    );
    
    INSERT INTO achievements (id, name, description, criteria) VALUES
        (gen_random_uuid(), 'First Step', 'First completed workout', '{"type": "workout_count", "threshold": 1}'),
        (gen_random_uuid(), 'Ten', '10 completed workouts', '{"type": "workout_count", "threshold": 10}'),
        (gen_random_uuid(), 'Fifty', '50 completed workouts', '{"type": "workout_count", "threshold": 50}')
    ON CONFLICT DO NOTHING;