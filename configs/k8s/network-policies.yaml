      protocol: TCP
---
# External ingress → nginx-lb (8443)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-to-nginx
  namespace: fitness-platform
spec:
  podSelector:
    matchLabels:
      app: nginx-lb
  policyTypes:
  - Ingress
  ingress:
  - ports:
    - port: 8443
      protocol: TCP
