apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-ingress
  namespace: fitness-platform
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-egress
  namespace: fitness-platform
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to: []
---
# DNS egress — all pods need DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: fitness-platform
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to: []
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
---
# nginx-lb → gateway (8080)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nginx-to-gateway
  namespace: fitness-platform
spec:
  podSelector:
    matchLabels:
      app: gateway
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: nginx-lb
    ports:
    - port: 8080
      protocol: TCP
---
# gateway → user-service (gRPC 50051)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
