name: Deploy to WSL

on:
  push:
    branches: [main, Microservice_arc]
  workflow_dispatch:

jobs:
  test-and-deploy:
    name: Test and Deploy
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      # Go tests
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      
      - name: Generate protobuf
        run: |
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          ./scripts/generate-proto.sh
      
      - name: Run Go tests
        run: |
          go mod download
          go vet ./...
          go test -v ./...
      
      # Python tests
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run Python tests
        run: |
          pip install flake8 pytest
          cd ml/classification && pip install -r requirements.txt && cd ../..
          cd ml/generation && pip install -r requirements.txt && cd ../..
          flake8 ml/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
      
      # Deploy
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Add to known_hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
      
      - name: Clean up old containers
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            cd ~/healthfit-deploy 2>/dev/null && docker-compose down -v || true
            docker system prune -f
          '
      
      - name: Create .env file
        run: |
          cat > .env << EOF
          POSTGRES_USER=healthfit
          POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}
          POSTGRES_DB=healthfit
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASS=${{ secrets.RABBITMQ_PASS }}
          RABBITMQ_URL=${{ secrets.RABBITMQ_URL }}
          MODEL_PATH=/app/models
          EOF
      
      - name: Copy files
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'mkdir -p ~/healthfit-deploy'
          scp -r .env docker-compose.yml cmd internal ml pkg proto scripts ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/healthfit-deploy/
      
      - name: Deploy
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            cd ~/healthfit-deploy
            docker-compose up -d --build
            sleep 15
            docker-compose ps
            echo "=== Health check ==="
            curl -s http://localhost:8080/health || echo "API Gateway not ready"
            curl -s http://localhost:8001/health || echo "ML Classification not ready"
            curl -s http://localhost:8002/health || echo "ML Generation not ready"
          '