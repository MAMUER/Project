name: Go Services CI

on:
  push:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'proto/**'
    branches: [main, develop]
  pull_request:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'proto/**'
    branches: [main]

env:
  GO_VERSION: "1.25"

jobs:
  test:
    name: Test Go Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      
      - name: Check formatting
        run: |
          go fmt ./...
          if [ -n "$(git status --porcelain)" ]; then
            echo "❌ Code is not formatted. Run 'go fmt ./...' and commit changes."
            exit 1
          fi
      
      - name: Generate protobuf
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          ./scripts/generate-proto.sh
      
      - name: Install dependencies
        run: go mod download
      
      - name: Run vet
        run: go vet ./...
      
      - name: Run tests with race detector
        run: go test -v -race -coverprofile=coverage.out ./...
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          flags: go
          name: go-coverage

  build:
    name: Build Go Services
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      
      - name: Generate protobuf
        run: ./scripts/generate-proto.sh
      
      - name: Build all services
        run: |
          mkdir -p bin
          go build -o bin/auth-service ./cmd/auth-service
          go build -o bin/biometric-ingest ./cmd/biometric-ingest
          go build -o bin/data-processor ./cmd/data-processor
          go build -o bin/notification-service ./cmd/notification-service
          go build -o bin/api-gateway ./cmd/api-gateway
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: go-binaries
          path: bin/
          retention-days: 7