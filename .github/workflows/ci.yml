name: CI/CD Pipeline

on:
  push:
    branches: [main, master, Microservice_arc]
  pull_request:
    branches: [main, master, Microservice_arc]

env:
  GO_VERSION: "1.25"
  REGISTRY: ghcr.io

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install dependencies
        run: go mod download
      - name: Run vet
        run: go vet ./...
      - name: Run fmt check
        run: |
          FILES=$(gofmt -l . | grep -v "cmd/tools/tools.go" || true)
          if [ -n "$FILES" ]; then
            echo "Files not formatted:"
            echo "$FILES"
            exit 1
          fi
          echo "All Go files are properly formatted"
      - name: Run tests
        run: go test -v -short ./...

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build Go services
        run: |
          mkdir -p bin
          go build -o bin/user-service ./cmd/user-service
          go build -o bin/biometric-service ./cmd/biometric-service
          go build -o bin/training-service ./cmd/training-service
          go build -o bin/gateway ./cmd/gateway
      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/

  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      
      - name: Get lowercase repo name
        id: repo-lower
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=$REPO_LOWER" >> $GITHUB_OUTPUT
      
      - name: Build and push all images
        run: |
          services="user-service biometric-service training-service gateway ml-classifier ml-generator"
          
          for svc in $services; do
            echo "Building $svc..."
            if [ -f cmd/$svc/Dockerfile ]; then
              docker build -f cmd/$svc/Dockerfile -t ${{ env.REGISTRY }}/${{ steps.repo-lower.outputs.repo_lower }}/$svc:latest .
              docker push ${{ env.REGISTRY }}/${{ steps.repo-lower.outputs.repo_lower }}/$svc:latest
              echo "✅ $svc pushed"
            else
              echo "❌ Dockerfile not found for $svc"
              exit 1
            fi
          done

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Prepare server directories
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            mkdir -p /opt/techip
            mkdir -p /opt/techip/certs
            mkdir -p /opt/techip/deploy/tls
            mkdir -p /opt/techip/deploy/lb
            mkdir -p /opt/techip/deploy/monitoring
          '
      
      - name: Create .env file on VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            cat > /opt/techip/.env << EOF
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=postgres
            POSTGRES_DB=fitness
            DB_HOST=postgres
            DB_PORT=5432
            DB_NAME=fitness
            DB_SSLMODE=disable
            REDIS_ADDR=redis:6379
            REDIS_PASSWORD=
            REDIS_DB=0
            RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            AUTH_PORT=8081
            AUTH_GRPC_PORT=50051
            TASKS_PORT=8082
            AUTH_GRPC_ADDR=auth:50051
            USER_SERVICE_ADDR=user-service:50051
            BIOMETRIC_SERVICE_ADDR=biometric-service:50052
            TRAINING_SERVICE_ADDR=training-service:50053
            GATEWAY_PORT=8080
            ML_CLASSIFIER_URL=http://ml-classifier:8001
            ML_GENERATOR_URL=http://ml-generator:8002
            MODEL_PATH=/app/models/classifier.keras
            SCALER_PATH=/app/models/scaler.pkl
            GENERATOR_PATH=/app/models/generator.h5
            EOF
          '
      
      - name: Copy docker-compose file
        run: |
          scp -o StrictHostKeyChecking=no deployments/docker-compose.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/docker-compose.yml
      
      - name: Copy init SQL
        run: |
          scp -o StrictHostKeyChecking=no scripts/init-db.sql ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/init.sql
      
      - name: Deploy with Docker Compose
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            cd /opt/techip
            docker-compose down 2>/dev/null || true
            docker-compose pull
            docker-compose up -d
            sleep 20
            docker-compose ps
          '
      
      - name: Verify deployment
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            echo "=== HEALTH CHECKS ==="
            curl -s http://localhost:8080/health || echo "Gateway not responding"
            echo ""
            curl -s http://localhost:8001/health || echo "ML Classifier not responding"
            echo ""
            curl -s http://localhost:8002/health || echo "ML Generator not responding"
          '
      
      - name: Send notification
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            MESSAGE="✅ CI/CD Pipeline успешно завершен!%0A%0A🌿 Ветка: ${{ github.ref_name }}%0A📦 Коммит: ${{ github.sha }}"
          else
            MESSAGE="❌ CI/CD Pipeline завершился с ошибкой!%0A%0A🌿 Ветка: ${{ github.ref_name }}%0A📦 Коммит: ${{ github.sha }}"
          fi
          
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="$MESSAGE" \
            -d parse_mode=HTML || echo "Telegram notification failed"