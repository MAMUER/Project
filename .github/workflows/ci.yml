name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run tests
        run: go test -v ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build all services
        run: |
          go build -o bin/user-service ./cmd/user-service
          go build -o bin/biometric-service ./cmd/biometric-service
          go build -o bin/training-service ./cmd/training-service
          go build -o bin/gateway ./cmd/gateway
      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push images
        run: |
          docker build -f cmd/user-service/Dockerfile -t ghcr.io/${{ github.repository }}/user-service:latest .
          docker push ghcr.io/${{ github.repository }}/user-service:latest
          docker build -f cmd/biometric-service/Dockerfile -t ghcr.io/${{ github.repository }}/biometric-service:latest .
          docker push ghcr.io/${{ github.repository }}/biometric-service:latest
          docker build -f cmd/training-service/Dockerfile -t ghcr.io/${{ github.repository }}/training-service:latest .
          docker push ghcr.io/${{ github.repository }}/training-service:latest
          docker build -f cmd/gateway/Dockerfile -t ghcr.io/${{ github.repository }}/gateway:latest .
          docker push ghcr.io/${{ github.repository }}/gateway:latest
          docker build -f cmd/ml-classifier/Dockerfile -t ghcr.io/${{ github.repository }}/ml-classifier:latest .
          docker push ghcr.io/${{ github.repository }}/ml-classifier:latest
          docker build -f cmd/ml-generator/Dockerfile -t ghcr.io/${{ github.repository }}/ml-generator:latest .
          docker push ghcr.io/${{ github.repository }}/ml-generator:latest