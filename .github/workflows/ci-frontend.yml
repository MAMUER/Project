name: Frontend CI

on:
  push:
    paths:
      - 'web/**'
    branches: [main, develop, Microservice_arc]
  pull_request:
    paths:
      - 'web/**'
    branches: [main]

jobs:
  test:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      
      - name: Install dependencies
        run: |
          cd web
          npm ci
      
      - name: Lint
        run: |
          cd web
          npm run lint
      
      - name: Type check
        run: |
          cd web
          npm run type-check
      
      - name: Run tests
        run: |
          cd web
          npm test -- --coverage
      
      - name: Build
        run: |
          cd web
          npm run build