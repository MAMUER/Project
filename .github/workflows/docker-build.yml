name: Docker Build & Push

on:
  push:
    branches: [main, Microservice_arc]
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata for Go services
        id: meta-go
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/go-services
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Go services
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.go
          push: true
          tags: ${{ steps.meta-go.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Extract metadata for ML Classification
        id: meta-ml-class
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ml-classification
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push ML Classification
        uses: docker/build-push-action@v5
        with:
          context: ml/classification
          file: ml/classification/Dockerfile
          push: true
          tags: ${{ steps.meta-ml-class.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Extract metadata for ML Generation
        id: meta-ml-gen
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ml-generation
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push ML Generation
        uses: docker/build-push-action@v5
        with:
          context: ml/generation
          file: ml/generation/Dockerfile
          push: true
          tags: ${{ steps.meta-ml-gen.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: web
          file: web/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max