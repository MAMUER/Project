name: CD - Deploy to Kubernetes

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  K8S_NAMESPACE: healthfit

jobs:
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure kubectl
        uses: azure/setup-kubectl@v3
      
      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
      
      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.K8S_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
      
      - name: Apply ConfigMap
        run: |
          kubectl apply -f deploy/k8s/base/configmap.yaml
      
      - name: Apply Secrets (with external secrets management)
        run: |
          # Используем sealed-secrets или external-secrets
          # Здесь пример с kubectl create secret
          kubectl create secret generic healthfit-secrets \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --from-literal=DB_USER="${{ secrets.DB_USER }}" \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=RABBITMQ_URL="${{ secrets.RABBITMQ_URL }}" \
            --dry-run=client -o yaml | kubectl apply -f -
      
      - name: Update image tags
        run: |
          # Update image tags with latest commit hash
          sed -i "s|:latest|:${{ github.sha }}|g" deploy/k8s/base/deployment.yaml
      
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f deploy/k8s/base/
          kubectl rollout status deployment/healthfit-auth -n ${{ env.K8S_NAMESPACE }} --timeout=5m
          kubectl rollout status deployment/healthfit-biometric-ingest -n ${{ env.K8S_NAMESPACE }} --timeout=5m
          kubectl rollout status deployment/healthfit-ml-classification -n ${{ env.K8S_NAMESPACE }} --timeout=5m
      
      - name: Verify deployment
        run: |
          kubectl get pods -n ${{ env.K8S_NAMESPACE }}
          kubectl get svc -n ${{ env.K8S_NAMESPACE }}
      
      - name: Health check
        run: |
          sleep 30
          kubectl port-forward svc/api-gateway-service -n ${{ env.K8S_NAMESPACE }} 8080:8080 &
          sleep 5
          curl -f http://localhost:8080/health || exit 1