openapi: 3.0.3
info:
  title: HealthFit Platform API
  description: API для интеллектуальной платформы управления физической активностью
  version: 1.0.0
servers:
  - url: https://api.healthfit.ru/v1
  - url: http://localhost:8080/api/v1

paths:
  /auth/login:
    post:
      summary: Аутентификация пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user_id:
                    type: string
                  role:
                    type: string
                  expires_in:
                    type: integer