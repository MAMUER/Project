services:
  postgres:
    image: postgres:15-alpine
    container_name: healthfit-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthfit-network

  redis:
    image: redis:7-alpine
    container_name: healthfit-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - healthfit-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: healthfit-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthfit-network

  ml-classification:
    build:
      context: ./ml/classification
      dockerfile: Dockerfile
    container_name: healthfit-ml-classification
    ports:
      - "8001:8001"
    environment:
      - MODEL_PATH=${MODEL_PATH}
    volumes:
      - ./ml/classification/models:/app/models
    networks:
      - healthfit-network

  ml-generation:
    build:
      context: ./ml/generation
      dockerfile: Dockerfile
    container_name: healthfit-ml-generation
    ports:
      - "8002:8002"
    environment:
      - MODEL_PATH=${MODEL_PATH}
    volumes:
      - ./ml/generation/models:/app/models
    networks:
      - healthfit-network

  auth-service:
    build:
      context: .
      dockerfile: cmd/auth-service/Dockerfile
    container_name: healthfit-auth
    ports:
      - "50051:50051"
    environment:
      - SERVICE_PORT=50051
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSL_MODE=disable
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - healthfit-network

  biometric-ingest:
    build:
      context: .
      dockerfile: cmd/biometric-ingest/Dockerfile
    container_name: healthfit-biometric-ingest
    ports:
      - "8082:8082"
    environment:
      - SERVICE_PORT=8082
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSL_MODE=disable
      - RABBITMQ_URL=${RABBITMQ_URL}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - healthfit-network

  data-processor:
    build:
      context: .
      dockerfile: cmd/data-processor/Dockerfile
    container_name: healthfit-data-processor
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSL_MODE=disable
      - RABBITMQ_URL=${RABBITMQ_URL}
      - ML_CLASSIFICATION_ADDR=ml-classification:8001
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ml-classification:
        condition: service_started
    networks:
      - healthfit-network

  api-gateway:
    build:
      context: .
      dockerfile: cmd/api-gateway/Dockerfile
    container_name: healthfit-api-gateway
    ports:
      - "8080:8080"
    environment:
      - SERVICE_PORT=8080
      - AUTH_SERVICE_ADDR=auth-service:50051
      - ML_GENERATION_ADDR=ml-generation:8002
    depends_on:
      auth-service:
        condition: service_started
      ml-generation:
        condition: service_started
    networks:
      - healthfit-network

networks:
  healthfit-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data: