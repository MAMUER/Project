<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Подтверждение email — FitPulse</title>
<link rel="stylesheet" href="/static/css/confirm.css">
</head>
<body>
  <div class="container">
    <h1>Подтверждение email</h1>
    <p>Пожалуйста, подождите...</p>
    <div class="spinner" id="spinner"></div>
    <div class="result" id="result"></div>
    <div class="back-link" id="backLink"><a href="/">← Вернуться ко входу</a></div>
  </div>
  <script>
    (function() {
      var token = "{{ .Token }}";
      if (!token) {
        showError('Токен подтверждения не найден. Проверьте письмо и попробуйте снова.');
        return;
      }
      fetch('/api/v1/auth/confirm', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({token: token})
      })
      .then(function(r) { return r.json().then(function(d) { return {ok: r.ok, data: d}; }); })
      .then(function(res) {
        if (res.ok) {
          showSuccess('Email успешно подтверждён! Теперь вы можете войти в систему.');
        } else {
          var msg = typeof res.data === 'string' ? res.data : (res.data ? JSON.stringify(res.data) : 'Ошибка подтверждения');
          showError(msg);
        }
      })
      .catch(function() {
        showError('Произошла ошибка соединения. Попробуйте позже.');
      });

      function showSuccess(msg) {
        hideSpinner();
        var el = document.getElementById('result');
        el.textContent = msg;
        el.className = 'result success';
        el.style.display = 'block';
        document.getElementById('backLink').style.display = 'block';
      }
      function showError(msg) {
        hideSpinner();
        var el = document.getElementById('result');
        el.textContent = msg;
        el.className = 'result error';
        el.style.display = 'block';
        document.getElementById('backLink').style.display = 'block';
      }
      function hideSpinner() {
        document.getElementById('spinner').style.display = 'none';
        document.querySelector('.container > p').style.display = 'none';
      }
    })();
  </script>
</body>
</html>
