<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .error-container { text-align: center; padding: 2rem; }
        .error-container h1 { font-size: 1.5rem; font-weight: 400; margin-bottom: 1rem; color: #aaa; }
        .error-container p { font-size: 1rem; color: #666; margin-bottom: 2rem; }
        .error-btn { display: inline-block; padding: 0.75rem 1.5rem; background: #1a1a2e; color: #e0e0e0; text-decoration: none; border-radius: 4px; border: 1px solid #333; transition: background 0.2s; }
        .error-btn:hover { background: #16213e; }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>The requested resource is not available</h1>
        <p>The page you are looking for cannot be found or is no longer available.</p>
        <a href="/" class="error-btn">Go Home</a>
    </div>
</body>
</html>
