syntax = "proto3";

package user;

// Важно: путь должен соответствовать структуре проекта
option go_package = "github.com/MAMUER/Project/api/gen/user";

import "google/protobuf/timestamp.proto";

service UserService {
    rpc Register(RegisterRequest) returns (RegisterResponse);
    rpc ConfirmEmail(ConfirmEmailRequest) returns (ConfirmEmailResponse);
    rpc Login(LoginRequest) returns (LoginResponse);
    rpc GetProfile(GetProfileRequest) returns (UserProfile);
    rpc UpdateProfile(UpdateProfileRequest) returns (UserProfile);
    rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
}

message RegisterRequest {
    string email = 1;
    string password = 2;
    string full_name = 3;
    string role = 4;
}

message RegisterResponse {
    string user_id = 1;
    string message = 2;
}

message ConfirmEmailRequest {
    string token = 1;
}

message ConfirmEmailResponse {
    string user_id = 1;
    string message = 2;
}

message LoginRequest {
    string email = 1;
    string password = 2;
}

message LoginResponse {
    string access_token = 1;
    string token_type = 2;
    int64 expires_in = 3;
    string user_id = 4;
    string role = 5;
}

message GetProfileRequest {
    string user_id = 1;
}

// ✅ Обновлён: добавлены nutrition и sleep_hours
message UpdateProfileRequest {
    string user_id = 1;
    optional int32 age = 2;
    optional string gender = 3;
    optional int32 height_cm = 4;
    optional double weight_kg = 5;
    optional string fitness_level = 6;
    repeated string goals = 7;
    repeated string contraindications = 8;
    optional string nutrition = 9;           // ← НОВОЕ
    optional float sleep_hours = 10;         // ← НОВОЕ
}

// ✅ Обновлён: добавлены nutrition и sleep_hours
message UserProfile {
    string user_id = 1;
    string email = 2;
    string full_name = 3;
    string role = 4;
    bool email_confirmed = 5;                 // ← НОВОЕ
    int32 age = 6;
    string gender = 7;
    int32 height_cm = 8;
    double weight_kg = 9;
    string fitness_level = 10;
    repeated string goals = 11;
    repeated string contraindications = 12;
    string created_at = 13;
    string updated_at = 14;
    string nutrition = 15;
    float sleep_hours = 16;
}

message ListUsersRequest {
    int32 page = 1;
    int32 page_size = 2;
    string role = 3;
}

message ListUsersResponse {
    repeated UserProfile users = 1;
    int32 total = 2;
}