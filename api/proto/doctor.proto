syntax = "proto3";

package doctor;

option go_package = "github.com/MAMUER/Project/api/gen/doctor";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

service DoctorService {
    // Управление врачами
    rpc ListDoctors(ListDoctorsRequest) returns (ListDoctorsResponse);
    rpc GetDoctor(GetDoctorRequest) returns (Doctor);
    
    // Подписки
    rpc SubscribeToDoctor(SubscribeRequest) returns (SubscribeResponse);
    rpc GetSubscription(GetSubscriptionRequest) returns (Subscription);
    rpc CancelSubscription(CancelSubscriptionRequest) returns (CancelSubscriptionResponse);
    
    // Чат
    rpc SendMessage(SendMessageRequest) returns (Message);
    rpc GetChatHistory(GetChatHistoryRequest) returns (GetChatHistoryResponse);
    rpc MarkMessagesRead(MarkMessagesReadRequest) returns (MarkMessagesReadResponse);
    rpc GetUnreadCount(GetUnreadCountRequest) returns (GetUnreadCountResponse);
    
    // Назначения врача
    rpc CreatePrescription(CreatePrescriptionRequest) returns (Prescription);
    rpc GetPrescriptions(GetPrescriptionsRequest) returns (GetPrescriptionsResponse);
    rpc UpdatePrescriptionStatus(UpdatePrescriptionStatusRequest) returns (UpdatePrescriptionStatusResponse);
    
    // Модификация тренировок
    rpc ModifyTrainingPlan(ModifyTrainingPlanRequest) returns (ModifyTrainingPlanResponse);
    rpc GetTrainingModifications(GetTrainingModificationsRequest) returns (GetTrainingModificationsResponse);
    
    // Консультации
    rpc ScheduleConsultation(ScheduleConsultationRequest) returns (Consultation);
    rpc GetConsultations(GetConsultationsRequest) returns (GetConsultationsResponse);
    rpc CompleteConsultation(CompleteConsultationRequest) returns (CompleteConsultationResponse);
}

// ===== Doctors =====

message Doctor {
    string id = 1;
    string email = 2;
    string full_name = 3;
    string specialty = 4;
    string license_number = 5;
    string phone = 6;
    string bio = 7;
    double rating = 8;
    int32 consultation_count = 9;
    bool is_active = 10;
}

message ListDoctorsRequest {
    int32 page = 1;
    int32 page_size = 2;
    string specialty = 3; // filter by specialty
}

message ListDoctorsResponse {
    repeated Doctor doctors = 1;
    int32 total = 2;
}

message GetDoctorRequest {
    string doctor_id = 1;
}

// ===== Subscriptions =====

message SubscribeRequest {
    string user_id = 1;
    string doctor_id = 2;
    string plan_type = 3; // monthly, quarterly, yearly
}

message SubscribeResponse {
    string subscription_id = 1;
    google.protobuf.Timestamp expires_at = 2;
    double price = 3;
}

message GetSubscriptionRequest {
    string user_id = 1;
    string doctor_id = 2;
}

message Subscription {
    string id = 1;
    string user_id = 2;
    string doctor_id = 3;
    string plan_type = 4;
    google.protobuf.Timestamp starts_at = 5;
    google.protobuf.Timestamp expires_at = 6;
    bool is_active = 7;
    double price = 8;
}

message CancelSubscriptionRequest {
    string user_id = 1;
    string doctor_id = 2;
}

message CancelSubscriptionResponse {
    bool success = 1;
    string message = 2;
}

// ===== Messages =====

message Message {
    string id = 1;
    string user_id = 2;
    string doctor_id = 3;
    string sender_id = 4;
    string sender_type = 5; // "user" or "doctor"
    string message = 6;
    string message_type = 7; // text, image, file, system
    bool is_read = 8;
    google.protobuf.Timestamp created_at = 9;
}

message SendMessageRequest {
    string user_id = 1;
    string doctor_id = 2;
    string sender_id = 3;
    string sender_type = 4;
    string message = 5;
    string message_type = 6;
}

message GetChatHistoryRequest {
    string user_id = 1;
    string doctor_id = 2;
    int32 page = 3;
    int32 page_size = 4;
}

message GetChatHistoryResponse {
    repeated Message messages = 1;
    int32 total = 2;
}

message MarkMessagesReadRequest {
    string user_id = 1;
    string doctor_id = 2;
}

message MarkMessagesReadResponse {
    int32 marked_count = 1;
}

message GetUnreadCountRequest {
    string user_id = 1;
}

message GetUnreadCountResponse {
    map<string, int32> unread_by_doctor = 1; // doctor_id -> count
    int32 total_unread = 2;
}

// ===== Prescriptions =====

message Prescription {
    string id = 1;
    string user_id = 2;
    string doctor_id = 3;
    string prescription_type = 4; // recommendation, diet_change, training_change, medication
    string title = 5;
    string description = 6;
    string priority = 7; // low, normal, high, urgent
    string status = 8; // active, completed, cancelled
    google.protobuf.Timestamp created_at = 9;
    google.protobuf.Timestamp updated_at = 10;
}

message CreatePrescriptionRequest {
    string user_id = 1;
    string doctor_id = 2;
    string prescription_type = 3;
    string title = 4;
    string description = 5;
    string priority = 6;
}

message GetPrescriptionsRequest {
    string user_id = 1;
    string status_filter = 2; // active, completed, cancelled, all
}

message GetPrescriptionsResponse {
    repeated Prescription prescriptions = 1;
    int32 total = 2;
}

message UpdatePrescriptionStatusRequest {
    string prescription_id = 1;
    string new_status = 2; // active, completed, cancelled
}

message UpdatePrescriptionStatusResponse {
    bool success = 1;
    string message = 2;
}

// ===== Training Modifications =====

message ModifyTrainingPlanRequest {
    string user_id = 1;
    string doctor_id = 2;
    string training_plan_id = 3;
    string modification_type = 4; // exercise_change, intensity_change, schedule_change, diet_change
    google.protobuf.Struct old_value = 5;
    google.protobuf.Struct new_value = 6;
    string reason = 7;
}

message ModifyTrainingPlanResponse {
    string modification_id = 1;
    bool success = 2;
    string message = 3;
}

message GetTrainingModificationsRequest {
    string user_id = 1;
    string training_plan_id = 2;
}

message GetTrainingModificationsResponse {
    repeated TrainingModification modifications = 1;
    int32 total = 2;
}

message TrainingModification {
    string id = 1;
    string user_id = 2;
    string doctor_id = 3;
    string training_plan_id = 4;
    string modification_type = 5;
    google.protobuf.Struct old_value = 6;
    google.protobuf.Struct new_value = 7;
    string reason = 8;
    google.protobuf.Timestamp created_at = 9;
}

// ===== Consultations =====

message Consultation {
    string id = 1;
    string user_id = 2;
    string doctor_id = 3;
    string status = 4; // scheduled, in_progress, completed, cancelled
    google.protobuf.Timestamp scheduled_at = 5;
    google.protobuf.Timestamp started_at = 6;
    google.protobuf.Timestamp ended_at = 7;
    string notes = 8;
    google.protobuf.Timestamp created_at = 9;
}

message ScheduleConsultationRequest {
    string user_id = 1;
    string doctor_id = 2;
    google.protobuf.Timestamp scheduled_at = 3;
}

message GetConsultationsRequest {
    string user_id = 1;
    string status_filter = 2; // scheduled, in_progress, completed, cancelled, all
}

message GetConsultationsResponse {
    repeated Consultation consultations = 1;
    int32 total = 2;
}

message CompleteConsultationRequest {
    string consultation_id = 1;
    string notes = 2;
}

message CompleteConsultationResponse {
    bool success = 1;
    string message = 2;
}
