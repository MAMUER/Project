syntax = "proto3";

package ml;

option go_package = "github.com/MAMUER/Project/api/gen/ml";

import "google/protobuf/struct.proto";

service MLService {
    rpc Classify(ClassifyRequest) returns (ClassifyResponse);
    rpc Generate(GenerateRequest) returns (GenerateResponse);
    // Новые методы для комплексной логики
    rpc ClassifyUserState(ClassifyUserStateRequest) returns (ClassifyUserStateResponse);
    rpc GenerateTrainingPlan(GenerateTrainingPlanRequest) returns (GenerateTrainingPlanResponse);
    rpc GenerateDietPlan(GenerateDietPlanRequest) returns (GenerateDietPlanResponse);
    rpc AdaptPlan(AdaptPlanRequest) returns (AdaptPlanResponse);
}

// ===== Existing messages =====

message ClassifyRequest {
    repeated double features = 1;
    map<string, string> user_metadata = 2;
}

message ClassifyResponse {
    string class = 1;
    double confidence = 2;
    string recommended_intensity = 3;
}

message GenerateRequest {
    string class = 1;
    string goal = 2;
    int32 duration_weeks = 3;
    repeated int32 available_days = 4;
    repeated string contraindications = 5;
    string fitness_level = 6;
}

message GenerateResponse {
    string plan_id = 1;
    bytes plan_data = 2;
}

// ===== New messages for comprehensive training =====

message BiometricData {
    optional double heart_rate = 1;
    optional double ecg = 2;
    optional double blood_pressure_systolic = 3;
    optional double blood_pressure_diastolic = 4;
    optional double spo2 = 5;
    optional double temperature = 6;
    optional double sleep_hours = 7;
    optional double hrv = 8;
}

message ConnectedDevice {
    string device_type = 1; // apple_watch, samsung_galaxy_watch, huawei_watch_d2, amazfit_trex3
    string device_id = 2;
    repeated string capabilities = 3;
}

enum TrainingGoal {
    TRAINING_GOAL_UNSPECIFIED = 0;
    TRAINING_GOAL_WEIGHT_LOSS = 1;
    TRAINING_GOAL_MUSCLE_GAIN = 2;
    TRAINING_GOAL_ENDURANCE = 3;
    TRAINING_GOAL_STRENGTH = 4;
    TRAINING_GOAL_FLEXIBILITY = 5;
    TRAINING_GOAL_GENERAL_FITNESS = 6;
    TRAINING_GOAL_REHABILITATION = 7;
}

enum TrainingLocation {
    TRAINING_LOCATION_UNSPECIFIED = 0;
    TRAINING_LOCATION_HOME = 1;
    TRAINING_LOCATION_GYM = 2;
    TRAINING_LOCATION_POOL = 3;
    TRAINING_LOCATION_OUTDOOR = 4;
    TRAINING_LOCATION_MIXED = 5;
}

enum TimeOfDay {
    TIME_OF_DAY_UNSPECIFIED = 0;
    TIME_OF_DAY_MORNING = 1;
    TIME_OF_DAY_AFTERNOON = 2;
    TIME_OF_DAY_EVENING = 3;
}

// ===== User State Classification =====

message ClassifyUserStateRequest {
    string user_id = 1;
    BiometricData biometrics = 2;
    int32 age = 3;
    double weight = 4;
    int32 height = 5;
    repeated string connected_devices = 6;
}

message ClassifyUserStateResponse {
    string state = 1; // recovery, endurance_e1e2, threshold_e3, strength_hiit, overtraining, illness
    string state_ru = 2;
    double confidence = 3;
    map<string, double> scores = 4;
    repeated string recommendations = 5;
}

// ===== Training Plan Generation =====

message GenerateTrainingPlanRequest {
    string user_id = 1;
    string user_state = 2; // from ClassifyUserState
    TrainingGoal training_goal = 3;
    TrainingLocation training_location = 4;
    TimeOfDay available_time = 5;
    repeated int32 available_days = 6; // 0=Mon, 6=Sun
    int32 duration_weeks = 7;
    optional string diseases = 8;
    repeated string contraindications = 9;
}

message Exercise {
    string name = 1;
    string name_ru = 2;
    int32 duration_minutes = 3;
    double intensity = 4; // 0.0 - 1.0
    optional int32 sets = 5;
    optional int32 reps = 6;
    int32 rest_seconds = 7;
    string description_ru = 8;
    optional string video_url = 9;
}

message DailyPlan {
    string date = 1;
    int32 day_of_week = 2; // 0=Mon, 6=Sun
    TimeOfDay time_of_day = 3;
    string training_type = 4;
    string training_type_ru = 5;
    repeated Exercise exercises = 6;
    int32 total_duration_minutes = 7;
    double intensity_level = 8;
    string notes_ru = 9;
    bool is_rest_day = 10;
}

message WeeklyPlan {
    int32 week_number = 1;
    repeated DailyPlan days = 2;
    int32 total_training_days = 3;
    int32 total_duration_minutes = 4;
    double average_intensity = 5;
}

message GenerateTrainingPlanResponse {
    string plan_id = 1;
    int32 plan_duration_weeks = 2;
    repeated WeeklyPlan weeks = 3;
    repeated string recommendations = 4;
    repeated string warnings = 5;
}

// ===== Diet Plan Generation =====

message GenerateDietPlanRequest {
    string user_id = 1;
    int32 age = 2;
    double weight = 3;
    int32 height = 4;
    TrainingGoal training_goal = 5;
    optional string diseases = 6;
}

message MealItem {
    string name = 1;
    string name_ru = 2;
    int32 portion_grams = 3;
    double calories = 4;
    double protein_g = 5;
    double carbs_g = 6;
    double fat_g = 7;
    string time = 8; // "08:00"
}

message DailyDiet {
    int32 day_of_week = 1;
    repeated MealItem meals = 2;
    double total_calories = 3;
    double total_protein_g = 4;
    double total_carbs_g = 5;
    double total_fat_g = 6;
    double water_liters = 7;
    string notes_ru = 8;
}

message DietPlan {
    string diet_type = 1;
    string diet_type_ru = 2;
    double daily_calories_target = 3;
    map<string, double> macros_ratio = 4; // protein, carbs, fat
    repeated DailyDiet days = 5;
    repeated string recommendations = 6;
    repeated string contraindications = 7;
}

message GenerateDietPlanResponse {
    DietPlan diet_plan = 1;
}

// ===== Adaptive Plan Modification =====

message AdaptPlanRequest {
    string user_id = 1;
    string plan_id = 2;
    map<string, double> current_biometrics = 3; // heart_rate, spo2, temperature, etc.
    int32 age = 4;
}

message AdaptPlanResponse {
    bool adapted = 1;
    repeated string changes = 2;
    repeated string warnings = 3;
    google.protobuf.Struct adapted_plan = 4;
}
