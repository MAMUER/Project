syntax = "proto3";

package ml_generation;

option go_package = "healthfit-platform/proto/gen/ml_generation";

service MLGeneration {
    rpc Generate(GenerateRequest) returns (GenerateResponse);
}

message UserConditions {
    repeated string contraindications = 1;
    repeated string goals = 2;
    string fitness_level = 3;
    string age_group = 4;
    string gender = 5;
    bool has_injury = 6;
}

message GenerateRequest {
    string training_class = 1;
    UserConditions user_conditions = 2;
    int32 duration_weeks = 3;
}

message WorkoutDay {
    int32 day = 1;
    string workout_type = 2;
    string intensity = 3;
    int32 duration_minutes = 4;
}

message TrainingWeek {
    int32 week = 1;
    repeated WorkoutDay schedule = 2;
    repeated string notes = 3;
}

message GenerateResponse {
    repeated TrainingWeek program = 1;
    string summary = 2;
}