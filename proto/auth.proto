syntax = "proto3";

package auth;

option go_package = "healthfit-platform/proto/gen/auth";

service AuthService {
    rpc Login(LoginRequest) returns (LoginResponse);
    rpc Verify(VerifyRequest) returns (VerifyResponse);
    rpc Refresh(RefreshRequest) returns (RefreshResponse);
}

message LoginRequest {
    string email = 1;
    string password = 2;
}

message LoginResponse {
    string token = 1;
    string user_id = 2;
    string role = 3;
    int64 expires_in = 4;
}

message VerifyRequest {
    string token = 1;
}

message VerifyResponse {
    bool valid = 1;
    string user_id = 2;
    string role = 3;
}

message RefreshRequest {
    string token = 1;
}

message RefreshResponse {
    string token = 1;
    int64 expires_in = 2;
}