syntax = "proto3";

package biometrics;

option go_package = "healthfit-platform/proto/gen/biometrics";

service BiometricsService {
    rpc SubmitData(SubmitDataRequest) returns (SubmitDataResponse);
    rpc GetHistory(GetHistoryRequest) returns (GetHistoryResponse);
}

message BiometricData {
    string user_id = 1;
    string device_type = 2;
    int32 heart_rate = 3;
    string ecg = 4;
    int32 systolic = 5;
    int32 diastolic = 6;
    int32 spo2 = 7;
    float temperature = 8;
    int32 sleep_duration = 9;
    int32 deep_sleep = 10;
    string timestamp = 11;
}

message SubmitDataRequest {
    BiometricData data = 1;
}

message SubmitDataResponse {
    bool accepted = 1;
    string message = 2;
}

message GetHistoryRequest {
    string user_id = 1;
    string from_date = 2;
    string to_date = 3;
}

message GetHistoryResponse {
    repeated BiometricData records = 1;
}