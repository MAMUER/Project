services:
  postgres:
    image: postgres:15-alpine
    container_name: fitness-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fitness
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fitness-network

  redis:
    image: redis:7-alpine
    container_name: fitness-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fitness-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: fitness-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fitness-network

  ml-classifier:
    build:
      context: ..
      dockerfile: cmd/ml-classifier/Dockerfile
    container_name: fitness-ml-classifier
    ports:
      - "8001:8001"
    environment:
      - ML_CLASSIFIER_PORT=8001
    networks:
      - fitness-network
    restart: unless-stopped

  ml-generator:
    build:
      context: ..
      dockerfile: cmd/ml-generator/Dockerfile
    container_name: fitness-ml-generator
    ports:
      - "8002:8002"
    environment:
      - ML_GENERATOR_PORT=8002
    networks:
      - fitness-network
    restart: unless-stopped

networks:
  fitness-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data: