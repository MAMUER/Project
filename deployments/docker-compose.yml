services:
  postgres:
    image: postgres:15-alpine
    container_name: fitness-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-fitness}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fitness-network

  redis:
    image: redis:7-alpine
    container_name: fitness-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fitness-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: fitness-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fitness-network

  # ✅ ML сервисы (уже обучены, просто запускаем API)
  ml-classifier:
    build:
      context: ..
      dockerfile: cmd/ml-classifier/Dockerfile
    container_name: fitness-ml-classifier
    ports:
      - "8001:8001"
    volumes:
      - ../models:/app/models
      - ../datasets:/app/datasets
    environment:
      - ML_CLASSIFIER_PORT=8001
    networks:
      - fitness-network
    restart: unless-stopped

  ml-generator:
    build:
      context: ..
      dockerfile: cmd/ml-generator/Dockerfile
    container_name: fitness-ml-generator
    ports:
      - "8002:8002"
    volumes:
      - ../models:/app/models
    environment:
      - ML_GENERATOR_PORT=8002
    networks:
      - fitness-network
    restart: unless-stopped

  # ✅ Go микросервисы
  user-service:
    build:
      context: ..
      dockerfile: cmd/user-service/Dockerfile
    container_name: fitness-user-service
    ports:
      - "50051:50051"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_NAME=${DB_NAME:-fitness}
      - REDIS_HOST=redis
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fitness-network
    restart: unless-stopped

  biometric-service:
    build:
      context: ..
      dockerfile: cmd/biometric-service/Dockerfile
    container_name: fitness-biometric-service
    ports:
      - "50052:50052"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_NAME=${DB_NAME:-fitness}
      - REDIS_HOST=redis
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fitness-network
    restart: unless-stopped

  training-service:
    build:
      context: ..
      dockerfile: cmd/training-service/Dockerfile
    container_name: fitness-training-service
    ports:
      - "50053:50053"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_NAME=${DB_NAME:-fitness}
      - REDIS_HOST=redis
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672/
      - ML_CLASSIFIER_URL=http://ml-classifier:8001
      - ML_GENERATOR_URL=http://ml-generator:8002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-classifier:
        condition: service_started
      ml-generator:
        condition: service_started
    networks:
      - fitness-network
    restart: unless-stopped

  gateway:
    build:
      context: ..
      dockerfile: cmd/gateway/Dockerfile
    container_name: fitness-gateway
    ports:
      - "8080:8080"
    environment:
      - USER_SERVICE_ADDR=user-service:50051
      - BIOMETRIC_SERVICE_ADDR=biometric-service:50052
      - TRAINING_SERVICE_ADDR=training-service:50053
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
    depends_on:
      - user-service
      - biometric-service
      - training-service
    networks:
      - fitness-network
    restart: unless-stopped

  # ✅ Nginx Load Balancer (упрощённый)
  nginx-lb:
    image: nginx:alpine
    container_name: fitness-nginx-lb
    ports:
      - "8081:8080"
    volumes:
      - ./deploy/lb/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../web/static/errors:/usr/share/nginx/html/errors:ro
    depends_on:
      - gateway
    networks:
      - fitness-network
    restart: unless-stopped

networks:
  fitness-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data: