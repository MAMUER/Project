services:
  postgres:
    image: postgres:15-alpine
    container_name: fitness-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fitness
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fitness-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: fitness-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fitness-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: fitness-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fitness-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ml-classifier:
    build:
      context: ..
      dockerfile: cmd/ml-classifier/Dockerfile
    container_name: fitness-ml-classifier
    ports:
      - "8001:8001"
    environment:
      - ML_CLASSIFIER_PORT=8001
    networks:
      - fitness-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ml-generator:
    build:
      context: ..
      dockerfile: cmd/ml-generator/Dockerfile
    container_name: fitness-ml-generator
    ports:
      - "8002:8002"
    environment:
      - ML_GENERATOR_PORT=8002
    networks:
      - fitness-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx-https:
    image: nginx:alpine
    container_name: fitness-nginx
    ports:
      - "8443:8443"
    volumes:
      - ./deploy/tls/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/tls/certs:/opt/techip/certs:ro
      - ../web/static/errors:/usr/share/nginx/html/errors:ro  
    depends_on:
      - tasks       # если tasks запускается отдельно
      - auth
    networks:
      - fitness-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx-lb:
    image: nginx:alpine
    container_name: fitness-nginx-lb
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/lb/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../web/static/errors:/usr/share/nginx/html/errors:ro   
    depends_on:
      - tasks_1
      - tasks_2
      - tasks_3
    networks:
      - fitness-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  fitness-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data: