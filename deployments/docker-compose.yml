services:
  postgres:
    image: postgres:15-alpine
    container_name: fitness-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-fitness}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fitness-network

  redis:
    image: redis:7-alpine
    container_name: fitness-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fitness-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: fitness-rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fitness-network

  # ✅ ML сервисы (уже обучены, просто запускаем API)
  ml-classifier:
    build:
      context: ..
      dockerfile: cmd/ml-classifier/Dockerfile
    container_name: fitness-ml-classifier
    ports:
      - "${ML_CLASSIFIER_PORT:-8001}:8001"
    volumes:
      - ../models:/app/models
      - ../datasets:/app/datasets
    environment:
      - KERAS_BACKEND=tensorflow
      - ML_ASYNC=true
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER required}:${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS required}@rabbitmq:5672/
      - REDIS_HOST=redis
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fitness-network
    restart: unless-stopped

  ml-generator:
    build:
      context: ..
      dockerfile: cmd/ml-generator/Dockerfile
    container_name: fitness-ml-generator
    ports:
      - "${ML_GENERATOR_PORT:-8002}:8002"
    volumes:
      - ../models:/app/models
    environment:
      - KERAS_BACKEND=tensorflow
      - ML_ASYNC=true
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER required}:${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS required}@rabbitmq:5672/
      - REDIS_HOST=redis
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fitness-network
    restart: unless-stopped

  # ✅ Go микросервисы
  user-service:
    build:
      context: ..
      dockerfile: cmd/user-service/Dockerfile
    container_name: fitness-user-service
    env_file:
      - ../.env
    ports:
      - "${USER_SERVICE_PORT:-50051}:50051"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_NAME=${DB_NAME:-fitness}
      - DB_SSLMODE=disable
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - REDIS_HOST=redis
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER required}:${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS required}@rabbitmq:5672/
      # SMTP — берётся из .env файла
      - SMTP_HOST=${SMTP_HOST:-mailpit}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@fitpulse.app}
      - SMTP_TLS=${SMTP_TLS:-false}
      - EMAIL_DAILY_LIMIT=${EMAIL_DAILY_LIMIT:-100}
      - EMAIL_SKIP_DOMAINS=${EMAIL_SKIP_DOMAINS:-}
      - BASE_URL=http://localhost:8443
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fitness-network
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: fitness-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      - MP_MAX_MESSAGES=5000
    networks:
      - fitness-network
    restart: unless-stopped

  biometric-service:
    build:
      context: ..
      dockerfile: cmd/biometric-service/Dockerfile
    container_name: fitness-biometric-service
    ports:
      - "${BIOMETRIC_SERVICE_PORT:-50052}:50052"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_NAME=${DB_NAME:-fitness}
      - DB_SSLMODE=disable
      - REDIS_HOST=redis
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER required}:${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS required}@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fitness-network
    restart: unless-stopped

  device-connector:
    build:
      context: ..
      dockerfile: cmd/device-connector/Dockerfile
    container_name: fitness-device-connector
    ports:
      - "${DEVICE_CONNECTOR_PORT:-8082}:8082"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_NAME=${DB_NAME:-fitness}
      - DB_SSLMODE=disable
      - BIOMETRIC_SERVICE_ADDR=biometric-service:50052
    depends_on:
      postgres:
        condition: service_healthy
      biometric-service:
        condition: service_started
    networks:
      - fitness-network
    restart: unless-stopped

  training-service:
    build:
      context: ..
      dockerfile: cmd/training-service/Dockerfile
    container_name: fitness-training-service
    ports:
      - "${TRAINING_SERVICE_PORT:-50053}:50053"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_NAME=${DB_NAME:-fitness}
      - DB_SSLMODE=disable
      - REDIS_HOST=redis
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER required}:${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS required}@rabbitmq:5672/
      - ML_CLASSIFIER_URL=http://ml-classifier:8001
      - ML_GENERATOR_URL=http://ml-generator:8002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-classifier:
        condition: service_started
      ml-generator:
        condition: service_started
    networks:
      - fitness-network
    restart: unless-stopped

  gateway:
    build:
      context: ..
      dockerfile: cmd/gateway/Dockerfile
    container_name: fitness-gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    volumes:
      - ../web:/app/web:ro
    environment:
      - USER_SERVICE_ADDR=user-service:50051
      - BIOMETRIC_SERVICE_ADDR=biometric-service:50052
      - TRAINING_SERVICE_ADDR=training-service:50053
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - ML_CLASSIFIER_URL=http://ml-classifier:8001
      - ML_GENERATOR_URL=http://ml-generator:8002
      - DEVICE_CONNECTOR_URL=http://device-connector:8082
      - ML_ASYNC=true
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER required}:${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS required}@rabbitmq:5672/
      - REDIS_HOST=redis
    depends_on:
      - user-service
      - biometric-service
      - training-service
      - device-connector
      - ml-classifier
      - ml-generator
      - rabbitmq
      - redis
    networks:
      - fitness-network
    restart: unless-stopped

  # Nginx Load Balancer — full-featured
  # SSL termination + rate limiting + security headers + custom error pages
  nginx-lb:
    image: nginx:alpine
    container_name: fitness-nginx-lb
    ports:
      - "${NGINX_HTTPS_PORT:-8443}:8443"
    volumes:
      - ../deploy/lb/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../deploy/tls/certs:/etc/nginx/certs:ro
      - ../web/static/errors:/usr/share/nginx/html/errors:ro
    depends_on:
      - gateway
    networks:
      - fitness-network
    restart: unless-stopped

networks:
  fitness-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data: