
# ========================
# DATABASE CONFIGURATION
# ========================
spring.datasource.url=jdbc:postgresql://localhost:5432/fitness_club_db?currentSchema=fitness_club_db
spring.datasource.username=postgres
spring.datasource.password=1

# ========================
# JPA & HIBERNATE
# ========================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=fitness_club_db

# Server Configuration
server.port=8080

# Application Name
spring.application.name=Project

# Security Remember Me
spring.security.remember-me.key=someVerySecretAndUniqueKeyValue123!

# Thymeleaf Configuration
spring.thymeleaf.cache=false

# ========================
# LOGGING
# ========================
# Детальное логирование Spring Security
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web=DEBUG
logging.level.org.springframework.security.authentication=DEBUG

# Логирование ваших сервисов
logging.level.com.example.project=DEBUG

# Логирование SQL
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Отключите open-in-view
spring.jpa.open-in-view=false