<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">

<head>
    <title>Регистрация</title>
    <link rel="stylesheet" th:href="@{/css/registration.css}">
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css">
    <link rel='stylesheet' href='https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap'>

    <!-- Запрещаем масштабирование -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>

<body>
    <div class="registration-container">
        <div class="registration-page">
            <form th:action="@{/registration}" method="post" class="form">
                <h2>Регистрация</h2>

                <!-- Основная информация -->
                <div class="input-group">
                    <label for="username">Имя пользователя</label>
                    <div class="input-with-icon">
                        <ion-icon name="person-outline"></ion-icon>
                        <input type="text" id="username" name="username" placeholder="Придумайте имя пользователя"
                            required />
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Пароль</label>
                    <div class="input-with-icon">
                        <ion-icon name="lock-closed-outline"></ion-icon>
                        <input type="password" id="password" name="password" placeholder="············" required />
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Подтвердите пароль</label>
                    <div class="input-with-icon">
                        <ion-icon name="lock-closed-outline"></ion-icon>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="············"
                            required />
                    </div>
                </div>

                <!-- Личная информация -->
                <div class="input-group">
                    <label for="firstName">Имя</label>
                    <div class="input-with-icon">
                        <ion-icon name="person-circle-outline"></ion-icon>
                        <input type="text" id="firstName" name="firstName" placeholder="Ваше имя" required />
                    </div>
                </div>

                <div class="input-group">
                    <label for="lastName">Фамилия</label>
                    <div class="input-with-icon">
                        <ion-icon name="people-outline"></ion-icon>
                        <input type="text" id="lastName" name="lastName" placeholder="Ваша фамилия" required />
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="birthDate">Дата рождения</label>
                    <div class="input-with-icon">
                        <ion-icon name="calendar-outline"></ion-icon>
                        <input type="date" id="birthDate" name="birthDate" required />
                    </div>
                </div>

                <!-- Выбор клуба -->
                <div class="input-group">
                    <label for="clubName">Выберите клуб</label>
                    <div class="input-with-icon">
                        <ion-icon name="business-outline"></ion-icon>
                        <select id="clubName" name="clubName" required>
                            <option value="">-- Выберите клуб --</option>
                            <option th:each="club : ${clubs}" th:value="${club.clubName}" th:text="${club.clubName}">
                            </option>
                        </select>
                    </div>
                </div>

                <!-- Пол -->
                <div class="input-group">
                    <label>Пол</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="gender" value="1" required>
                            <span class="radio-custom"></span>
                            Мужской
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="gender" value="2" required>
                            <span class="radio-custom"></span>
                            Женский
                        </label>
                    </div>
                </div>

                <!-- Сообщения об ошибках/успехе -->
                <div th:if="${error}" class="error-message" th:text="${error}"></div>
                <div th:if="${success}" class="success-message" th:text="${success}"></div>

                <button type="submit" class="register-btn">Зарегистрироваться</button>

                <div class="login-link">
                    Уже есть аккаунт? <a th:href="@{/login}">Войдите</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Иконки -->
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>

</html>
